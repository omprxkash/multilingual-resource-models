data:
  kinnews_train: data/processed/kin_train.csv
  kinnews_test:  data/processed/kin_test.csv
  kirnews_train: data/processed/kir_train.csv
  kirnews_test:  data/processed/kir_test.csv
  embeddings_kin: data/processed/W2V-Kin-50.txt
  embeddings_kir: data/processed/W2V-Kir-50.txt

transformers:
  models: [mbert, afriberta, bantubert]
  num_labels: 14
  num_epochs: 8
  batch_size: 32
  learning_rate: 5.0e-5
  warmup_steps: 500
  weight_decay: 0.01
  max_length: 128
  fp16: false
  output_dir: outputs/crosslingual

traditional:
  bigru:
    embedding_dim: 50
    hidden_dim: 256
    n_layers: 2
    dropout: 0.5
    epochs: 10
    lr: 1.0e-3
    batch_size: 64

  cnn:
    embedding_dim: 50
    n_filters: 150
    filter_sizes: [3, 4, 5]
    dropout: 0.5
    epochs: 8
    lr: 1.0e-3
    batch_size: 64

  charcnn:
    max_seq_len: 1500
    n_conv_filters: 256
    n_fc_neurons: 1024
    dropout: 0.5
    epochs: 30
    optimizer: sgd
    lr: 0.01
    batch_size: 128

seed: 42
